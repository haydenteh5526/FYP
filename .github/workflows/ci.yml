name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: docvault_test
          POSTGRES_USER: docvault
          POSTGRES_PASSWORD: docvault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/dev-requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt -r dev-requirements.txt

      - name: Lint
        run: cd backend && ruff check app/ tests/

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://docvault:docvault@localhost:5432/docvault_test
        run: cd backend && alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://docvault:docvault@localhost:5432/docvault_test
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: documents
          JWT_SECRET: test-secret
          OCR_BACKEND: tesseract
        run: cd backend && pytest tests/ -v --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc -b

      - name: Test
        run: cd frontend && npm test

      - name: Build
        run: cd frontend && npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: docvault_test
          POSTGRES_USER: docvault
          POSTGRES_PASSWORD: docvault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: cd backend && pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://docvault:docvault@localhost:5432/docvault_test
        run: cd backend && alembic upgrade head

      - name: Start API
        env:
          DATABASE_URL: postgresql+asyncpg://docvault:docvault@localhost:5432/docvault_test
          JWT_SECRET: test-secret
          OCR_BACKEND: tesseract
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: documents
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then echo "API is up"; break; fi
            echo "waiting for API ($i)"; sleep 1
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd frontend && npx playwright test

      - name: Print API log on failure
        if: failure()
        run: cat /tmp/api.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/docvault-api:latest ./backend
          docker push ${{ steps.ecr.outputs.registry }}/docvault-api:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster docvault-cluster --service docvault-api --force-new-deployment
